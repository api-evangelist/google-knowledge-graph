naftiko: 1.0.0-alpha2
info:
  label: Google Knowledge Graph Search API
  description: The Google Knowledge Graph Search API allows developers to search for entities (people, places, things) in
    the Google Knowledge Graph and retrieve structured data about them in JSON-LD format conforming to schema.org standards.
  tags:
  - Google
  - Knowledge
  - Graph
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google-knowledge-graph
    baseUri: https://kgsearch.googleapis.com/v1
    description: Google Knowledge Graph Search API HTTP API.
    authentication:
      type: apikey
      in: query
      name: key
      value: '{{GOOGLE_KNOWLEDGE_GRAPH_TOKEN}}'
    resources:
    - name: entities-search
      path: /entities:search
      operations:
      - name: searchentities
        method: GET
        description: Google Knowledge Graph Search Search Entities
        inputParameters:
        - name: key
          in: query
          type: string
          required: true
          description: API key.
        - name: query
          in: query
          type: string
          description: A literal string to search for in the Knowledge Graph.
        - name: ids
          in: query
          type: array
          description: A list of entity IDs to search for.
        - name: languages
          in: query
          type: array
          description: The list of language codes (ISO 639) to run the query with.
        - name: types
          in: query
          type: array
          description: Restricts returned entities to those of the specified types.
        - name: limit
          in: query
          type: integer
          description: Limits the number of entities returned (max 500, default 20).
        - name: prefix
          in: query
          type: boolean
          description: Enables prefix (substring) matching against entity names and aliases.
        - name: indent
          in: query
          type: boolean
          description: Enables indenting of JSON results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: google-knowledge-graph-rest
    description: REST adapter for Google Knowledge Graph Search API.
    resources:
    - path: /entities:search
      name: searchentities
      operations:
      - method: GET
        name: searchentities
        description: Google Knowledge Graph Search Search Entities
        call: google-knowledge-graph.searchentities
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: google-knowledge-graph-mcp
    transport: http
    description: MCP adapter for Google Knowledge Graph Search API for AI agent use.
    tools:
    - name: searchentities
      description: Google Knowledge Graph Search Search Entities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-knowledge-graph.searchentities
      with:
        key: tools.key
        query: tools.query
        ids: tools.ids
        languages: tools.languages
        types: tools.types
        limit: tools.limit
        prefix: tools.prefix
        indent: tools.indent
      inputParameters:
      - name: key
        type: string
        description: API key.
        required: true
      - name: query
        type: string
        description: A literal string to search for in the Knowledge Graph.
      - name: ids
        type: array
        description: A list of entity IDs to search for.
      - name: languages
        type: array
        description: The list of language codes (ISO 639) to run the query with.
      - name: types
        type: array
        description: Restricts returned entities to those of the specified types.
      - name: limit
        type: integer
        description: Limits the number of entities returned (max 500, default 20).
      - name: prefix
        type: boolean
        description: Enables prefix (substring) matching against entity names and aliases.
      - name: indent
        type: boolean
        description: Enables indenting of JSON results.
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    GOOGLE_KNOWLEDGE_GRAPH_TOKEN: GOOGLE_KNOWLEDGE_GRAPH_TOKEN
