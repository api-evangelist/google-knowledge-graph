aid: google-knowledge-graph
name: Google Knowledge Graph Search API
description: >-
  The Google Knowledge Graph Search API allows developers to search for
  entities (people, places, things) in the Google Knowledge Graph and retrieve
  structured data about them in JSON-LD format conforming to schema.org
  standards. Results include names, descriptions, images, and detailed
  descriptions with relevance scoring.
