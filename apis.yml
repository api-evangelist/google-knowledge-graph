    description: >-
      Search for entities in the Google Knowledge Graph and retrieve structured
      data in JSON-LD format, including names, descriptions, images, types,
      and relevance scores.
    humanURL: https://developers.google.com/knowledge-graph
    baseURL: https://kgsearch.googleapis.com/v1
    tags:
      - Knowledge Graph
      - Entities
